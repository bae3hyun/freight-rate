<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수출 해상운임 현황판</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --navy: #0f2545;
    --navy-mid: #1a3a6b;
    --accent: #2a78d6;
    --accent-light: #e6f1fb;
    --up: #e34948;
    --dn: #1baf7a;
    --text: #1a1a1a;
    --text-sub: #52514e;
    --text-muted: #898781;
    --border: rgba(0,0,0,0.1);
    --surface: #f8f7f4;
    --card: #ffffff;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: var(--navy); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 16px; height: 16px; }
  .header-title { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.5); }
  .header-badge { font-size: 11px; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); }

  /* Main layout */
  .main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }

  /* Controls bar */
  .ctrl-bar { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; font-weight: 500; }
  .ctrl-select { font-size: 13px; padding: 6px 10px; border-radius: 7px; border: 1px solid #d0cfc8; background: var(--surface); color: var(--text); cursor: pointer; min-width: 130px; }
  .ctrl-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .sz-wrap { display: flex; border: 1px solid #d0cfc8; border-radius: 7px; overflow: hidden; }
  .sz-btn { font-size: 12px; font-weight: 500; padding: 6px 14px; background: var(--surface); color: var(--text-sub); cursor: pointer; border: none; transition: all .15s; }
  .sz-btn.on { background: var(--accent); color: #fff; }
  .divider { width: 1px; height: 24px; background: var(--border); }

  /* KPI row */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi-val { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 4px; }
  .kpi-sub { font-size: 12px; }
  .up { color: var(--up); } .dn { color: var(--dn); } .flat { color: var(--text-muted); }

  /* Chart + Table cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card-title-badge { font-size: 11px; font-weight: 400; background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 12px; }
  .chart-wrap { position: relative; width: 100%; height: 280px; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-sub); cursor: pointer; padding: 3px 8px; border-radius: 6px; border: 1px solid transparent; user-select: none; transition: all .15s; }
  .leg:hover { border-color: #d0cfc8; background: var(--surface); }
  .leg.off { opacity: .3; }
  .leg-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Table */
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 6px 8px; text-align: center; border-bottom: 2px solid var(--border); white-space: nowrap; background: var(--surface); }
  thead th:first-child { text-align: left; border-radius: 6px 0 0 0; }
  thead th:last-child { border-radius: 0 6px 0 0; }
  tbody td { padding: 7px 8px; text-align: center; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f5f4f1; }
  .td-line { text-align: left; font-weight: 600; color: var(--navy-mid); white-space: nowrap; }
  .td-na { color: #ccc; }
  .td-up { color: var(--up); font-weight: 600; }
  .td-dn { color: var(--dn); font-weight: 600; }

  /* Footer */
  .footer { text-align: center; padding: 20px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 10px; }

  /* Responsive */
  @media (max-width: 640px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .ctrl-bar { gap: 10px; }
    .divider { display: none; }
    .kpi-val { font-size: 18px; }
  }
</style>
</head>

const lv = arr => { for(let i=arr.length-1;i>=0;i--) if(arr[i]!==null) return arr[i]; return null; };
const pct = (a,b) => (!a||!b)?null:Math.round((b-a)/a*100);
const selR = () => document.getElementById('selRegion').value;
const selP = () => document.getElementById('selPod').value;
const gv = ld => sz===20 ? ld.r20 : ld.r40;

function buildKPI(pod){
  const lines = DATA[selR()][pod];
  let minR=Infinity,maxR=-Infinity,minL='',maxL='',f=[],l=[];
  Object.entries(lines).forEach(([ln,ld])=>{
    const vals=gv(ld), fv2=fv(vals), lv2=lv(vals);
    if(fv2!==null&&lv2!==null){f.push(fv2);l.push(lv2);}
    vals.forEach(v=>{if(v!==null){if(v<minR){minR=v;minL=ln;}if(v>maxR){maxR=v;maxL=ln;}}});
  });
  const af=f.length?Math.round(f.reduce((a,b)=>a+b)/f.length):null;
  const al=l.length?Math.round(l.reduce((a,b)=>a+b)/l.length):null;
  const ch=pct(af,al);
  const chHtml = ch===null?'' : ch>0?`<div class="kpi-sub up">▲ ${ch}% (2월→6월)</div>`
    :ch<0?`<div class="kpi-sub dn">▼ ${Math.abs(ch)}% (2월→6월)</div>`:`<div class="kpi-sub flat">변동 없음</div>`;
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">2월 평균 운임</div><div class="kpi-val">$${(af||0).toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">6월 최신 운임</div><div class="kpi-val">$${(al||0).toLocaleString()}</div>${chHtml}</div>
    <div class="kpi-card"><div class="kpi-label">최저가 선사</div><div class="kpi-val" style="font-size:16px;margin-top:2px">${minL}</div><div class="kpi-sub dn">$${minR.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">최고가 선사</div><div class="kpi-val" style="font-size:16px;margin-top:2px">${maxL}</div><div class="kpi-sub up">$${maxR.toLocaleString()}</div></div>`;
}

function buildChart(pod){
  const lines=DATA[selR()][pod], entries=Object.entries(lines);
  document.getElementById('chartBadge').textContent=`${selR()} / ${pod} · ${sz}ft · USD`;
  const datasets=entries.map(([ln,ld],i)=>({
    label:ln, data:gv(ld),
    borderColor:COLORS[i%COLORS.length],
    backgroundColor:COLORS[i%COLORS.length]+'18',
    borderWidth:2, pointRadius:4, pointHoverRadius:6,
    borderDash:DASHES[i%DASHES.length], tension:0.3,
    spanGaps:true, hidden:!!hidden[ln],
  }));
  const ctx=document.getElementById('mainChart').getContext('2d');
  if(chart) chart.destroy();
  chart=new Chart(ctx,{
    type:'line', data:{labels:PERIODS,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`${c.dataset.label}: $${c.parsed.y?.toLocaleString()??'-'}`}}},
      interaction:{mode:'index',intersect:false},
      scales:{
        x:{grid:{color:'rgba(0,0,0,0.05)',drawTicks:false},ticks:{autoSkip:false,maxRotation:0,color:'#898781',font:{size:11}},border:{color:'#ddd'}},
        y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#898781',font:{size:10},callback:v=>'$'+v.toLocaleString()},border:{color:'#ddd'}}
      }
    }
  });
  const lr=document.getElementById('legendRow');
  lr.innerHTML='';
  entries.forEach(([ln],i)=>{
    const el=document.createElement('span');
    el.className='leg'+(hidden[ln]?' off':'');
    el.innerHTML=`<span class="leg-sq" style="background:${COLORS[i%COLORS.length]}"></span>${ln}`;
    el.onclick=()=>{hidden[ln]=!hidden[ln];chart.getDatasetMeta(i).hidden=!!hidden[ln];el.classList.toggle('off');chart.update();};
    lr.appendChild(el);
  });
}

function buildTable(pod){
  const lines=DATA[selR()][pod], entries=Object.entries(lines);
  let h=`<table><thead><tr><th>선사</th>`;
  PERIODS.forEach(p=>h+=`<th>${p}</th>`);
  h+=`<th>변동률</th></tr></thead><tbody>`;
  entries.forEach(([ln,ld])=>{
    const vals=gv(ld), f=fv(vals), l=lv(vals), ch=pct(f,l);
    h+=`<tr><td class="td-line">${ln}</td>`;
    vals.forEach((v,i)=>{
      const prev=i>0?vals[i-1]:null;
      let cls='';
      if(v!==null&&prev!==null){if(v>prev)cls=' class="td-up"';else if(v<prev)cls=' class="td-dn"';}
      h+=v===null?`<td class="td-na">—</td>`:`<td${cls}>$${v.toLocaleString()}</td>`;
    });
    const chCell=ch===null?`<td class="td-na">—</td>`:ch>0?`<td class="td-up">▲${ch}%</td>`:ch<0?`<td class="td-dn">▼${Math.abs(ch)}%</td>`:`<td>—</td>`;
    h+=chCell+'</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('tableWrap').innerHTML=h;
}

function render(){
  const pod=selP(); if(!pod)return;
  hidden={};
  buildKPI(pod); buildChart(pod); buildTable(pod);
}

function setSz(s){
  sz=s;
  document.getElementById('btn20').className='sz-btn'+(s===20?' on':'');
  document.getElementById('btn40').className='sz-btn'+(s===40?' on':'');
  hidden={}; render();
}

function init(){
  const rSel=document.getElementById('selRegion');
  Object.keys(DATA).forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;rSel.appendChild(o);});
  rSel.onchange=()=>{
    const pSel=document.getElementById('selPod');
    pSel.innerHTML='';
    Object.keys(DATA[selR()]).forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;pSel.appendChild(o);});
    pSel.onchange=render;
    render();
  };
  rSel.dispatchEvent(new Event('change'));
}
init();
</script>
</body>
</html>
