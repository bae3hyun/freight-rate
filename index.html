<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>수출 해상운임 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --navy:#0f2545;--acc:#2a78d6;--acc2:#e8f1fb;
  --up:#e34948;--dn:#1baf7a;--warn-bg:#FEF3C7;--warn-txt:#92400E;
  --text:#1a1a1a;--sub:#52514e;--muted:#898781;
  --bdr:rgba(0,0,0,.09);--bg:#f4f3f0;--card:#fff;--r:10px
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

.hd{background:var(--navy);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200}
.hl{display:flex;align-items:center;gap:10px}
.lm{width:26px;height:26px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center}
.ht{font-size:14px;font-weight:600;color:#fff}
.hs{font-size:11px;color:rgba(255,255,255,.45)}
.hbadge{font-size:11px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}

.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:210px;flex-shrink:0;background:var(--card);border-right:1px solid var(--bdr);overflow-y:auto;padding:10px 6px}
.content{flex:1;min-width:0;padding:16px;overflow-y:auto}

.sb-region{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:8px 8px 3px}
.sb-pod{padding:5px 10px;border-radius:6px;cursor:pointer;color:var(--sub);display:flex;justify-content:space-between;align-items:center;font-size:12px;transition:all .12s}
.sb-pod:hover{background:#f0eeea;color:var(--text)}
.sb-pod.active{background:var(--acc2);color:var(--acc);font-weight:600}
.sb-cnt{font-size:10px;background:#e8e6e0;color:var(--muted);padding:1px 5px;border-radius:10px}
.sb-pod.active .sb-cnt{background:var(--acc);color:#fff}

.ctrl{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:13px}
.cg{display:flex;align-items:center;gap:7px}
.cl{font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap}
.sw{display:flex;border:1px solid #d0cfc8;border-radius:6px;overflow:hidden}
.sb2{font-size:12px;font-weight:500;padding:5px 13px;background:var(--bg);color:var(--sub);cursor:pointer;border:none;transition:all .12s}
.sb2.on{background:var(--acc);color:#fff}
.dv{width:1px;height:22px;background:var(--bdr)}

.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px}
.kc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px}
.kl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.kv{font-size:19px;font-weight:700;line-height:1;margin-bottom:3px}
.ks{font-size:11px}.up{color:var(--up)}.dn{color:var(--dn)}.fl{color:var(--muted)}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 18px;margin-bottom:13px}
.ctitle{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cbadge{font-size:11px;font-weight:400;background:var(--acc2);color:var(--acc);padding:2px 8px;border-radius:12px}
.cw{position:relative;width:100%;height:255px}
.lgrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);cursor:pointer;padding:2px 7px;border-radius:5px;border:1px solid transparent;user-select:none;transition:all .12s}
.li:hover{border-color:#ccc;background:var(--bg)}
.li.off{opacity:.3}
.lsq{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── Detail cards ── */
.det-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.det-card{background:var(--card);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;display:flex;flex-direction:column}
.det-head{background:#f0eff8;padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.line-badge{background:var(--navy);color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.best-badge{background:#dcfce7;color:#166534;font-size:10px;padding:2px 7px;border-radius:4px}
.tt-badge{background:#e8f5f0;color:#0a5c3e;font-size:10px;padding:2px 7px;border-radius:4px;display:flex;align-items:center;gap:2px}
.spot-badge{background:var(--warn-bg);color:var(--warn-txt);font-size:10px;padding:2px 7px;border-radius:4px}
.stop-badge{background:#fee2e2;color:#991b1b;font-size:10px;padding:2px 7px;border-radius:4px}

.det-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:10px}

/* 선임 블록 */
.fare-block{display:flex;gap:0;border:1px solid var(--bdr);border-radius:7px;overflow:hidden}
.fare-col{flex:1;padding:8px 10px;text-align:center}
.fare-col:first-child{border-right:1px solid var(--bdr)}
.fare-col.active{background:var(--acc2)}
.fare-label{font-size:10px;color:var(--muted);margin-bottom:3px}
.fare-val{font-size:18px;font-weight:700;color:var(--text)}
.fare-col.active .fare-val{color:var(--acc)}

/* 부대비 블록 */
.sur-block{background:#fafaf8;border:1px solid var(--bdr);border-radius:7px;overflow:hidden}
.sur-title{font-size:10px;font-weight:600;color:var(--muted);padding:6px 10px 4px;border-bottom:1px solid var(--bdr);text-transform:uppercase;letter-spacing:.4px}
.sur-table{width:100%;border-collapse:collapse}
.sur-table td{padding:4px 10px;font-size:12px;border-bottom:1px solid var(--bdr)}
.sur-table tr:last-child td{border-bottom:none}
.sur-name{color:var(--sub);font-weight:600;width:55px}
.sur-v{text-align:right;color:var(--text)}
.sur-v.active{color:var(--acc);font-weight:600}
.sur-total{background:#f0eff8;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #e0dff5}
.sur-total-label{font-size:11px;font-weight:600;color:var(--navy)}
.sur-total-val{font-size:14px;font-weight:700;color:var(--acc)}
.sur-grand{background:var(--navy);padding:6px 10px;display:flex;justify-content:space-between;align-items:center}
.sur-grand-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.7)}
.sur-grand-val{font-size:15px;font-weight:700;color:#fff}
.no-sur{font-size:11px;color:var(--muted);padding:6px 10px;text-align:center}
.remark-row{font-size:11px;color:var(--sub);line-height:1.6;padding:5px 0}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:160px;border-right:none;border-bottom:1px solid var(--bdr)}
  .krow{grid-template-columns:repeat(2,1fr)}
  .det-wrap{grid-template-columns:1fr}
}
</style>
</head>

<header class="hd">
  <div class="hl">
    <div class="lm"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 12L5 6L8 9L11 4L14 8" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><div class="ht">수출 해상운임 대시보드</div><div class="hs">Export Ocean Freight Dashboard</div></div>
  </div>
  <div class="hbadge" id="hbadge"></div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content">
    <div class="ctrl">
      <div class="cg"><span class="cl">출발항</span>
        <div class="sw">
          <button class="sb2 on" id="bBusan" onclick="setPol('부산')">부산</button>
          <button class="sb2" id="bInchon" onclick="setPol('인천')">인천</button>
        </div>
      </div>
      <div class="dv"></div>
      <div class="cg"><span class="cl">컨테이너</span>
        <div class="sw">
          <button class="sb2 on" id="b20" onclick="setSz(20)">20ft</button>
          <button class="sb2" id="b40" onclick="setSz(40)">40ft</button>
        </div>
      </div>
    </div>

    <div class="krow" id="krow"></div>

    <div class="card">
      <div class="ctitle">선사별 선임 추이 <span class="cbadge" id="chartBadge"></span></div>
      <div class="cw"><canvas id="mc" role="img"></canvas></div>
      <div class="lgrow" id="lgrow"></div>
    </div>

    <div class="card">
      <div class="ctitle">
        최신 운임 상세
        <span class="cbadge" id="detBadge"></span>
        <span style="font-size:11px;color:var(--muted);font-weight:400">선임 · 부대비 · 합계 · T/T</span>
      </div>
      <div class="det-wrap" id="detWrap"></div>
    </div>
  </main>
</div>

/* ── 부대비 파싱 ── */
function parseSurcharges(remark){
  if(!remark||!remark.trim()) return {surs:[],warns:[],rawNote:''};
  const surs=[], seen=new Set(), warns=[];

  // 경고 추출
  if(/SPOT|부킹\s*주의|주의\s*필요|재확인\s*필요/i.test(remark)) warns.push('⚠ SPOT/주의');
  if(/부킹중단/i.test(remark)) warns.push('🚫 부킹중단');

  // P1: NAME $숫자/숫자
  [...remark.matchAll(/([A-Z]{2,6})\s*\$\s*(\d+)\s*\/\s*(\d+)/g)].forEach(m=>{
    const [,name,v20,v40]=[...m];
    if(!seen.has(name)){ seen.add(name); surs.push({name,r20:+v20,r40:+v40}); }
  });
  // P2: NAME ($숫자/숫자) 괄호형
  [...remark.matchAll(/([A-Z]{2,6})\s*\(\s*\$?\s*(\d+)\s*\/\s*(\d+)\s*\)/g)].forEach(m=>{
    const [,name,v20,v40]=[...m];
    if(!seen.has(name)){ seen.add(name); surs.push({name,r20:+v20,r40:+v40}); }
  });
  // P3: NAME 숫자/숫자 (단위없음: CGC 100/200, EFL 80/160)
  [...remark.matchAll(/([A-Z]{2,5})\s+(\d{2,4})\s*\/\s*(\d{2,4})(?!\s*[A-Z])/g)].forEach(m=>{
    const [,name,v20,v40]=[...m];
    if(!seen.has(name)&&name!=='DAY'&&name!=='VIA'){ seen.add(name); surs.push({name,r20:+v20,r40:+v40}); }
  });
  // P4: NAME $숫자/TEU
  [...remark.matchAll(/([A-Z]{2,5})\s*\$?\s*(\d+)\s*\/TEU/g)].forEach(m=>{
    const [,name,v]=[...m];
    if(!seen.has(name)){ seen.add(name); surs.push({name,r20:+v,r40:+v}); }
  });

  // 원문 비고 (한글 포함 나머지)
  const rawNote=remark.replace(/\n/g,' ').trim();
  return {surs,warns,rawNote};
}

/* ── 사이드바 ── */
function buildSidebar(){
  const sb=document.getElementById('sidebar'); sb.innerHTML='';
  Object.entries(MENU).forEach(([region,pods])=>{
    const sec=document.createElement('div');
    const rh=document.createElement('div'); rh.className='sb-region'; rh.textContent=region;
    sec.appendChild(rh);
    let hasPod=false;
    Object.keys(pods).forEach(pod=>{
      const key=region+'||'+pod+'||'+curPol;
      if(!DETAIL[key]) return;
      hasPod=true;
      const el=document.createElement('div');
      el.className='sb-pod'+(region===curR&&pod===curP?' active':'');
      const cnt=(DETAIL[key]||[]).length;
      el.innerHTML=`<span>${pod}</span><span class="sb-cnt">${cnt}</span>`;
      el.onclick=()=>selectPod(region,pod);
      sec.appendChild(el);
    });
    if(hasPod) sb.appendChild(sec);
  });
}

function selectPod(region,pod){
  curR=region; curP=pod; hidden={};
  buildSidebar(); render();
}

function setPol(pol){
  curPol=pol;
  document.getElementById('bBusan').className='sb2'+(pol==='부산'?' on':'');
  document.getElementById('bInchon').className='sb2'+(pol==='인천'?' on':'');
  // 첫 번째 유효 POD 자동 선택
  for(const [region,pods] of Object.entries(MENU)){
    for(const pod of Object.keys(pods)){
      if(DETAIL[region+'||'+pod+'||'+pol]){ curR=region; curP=pod; hidden={}; buildSidebar(); render(); return; }
    }
  }
}

function setSz(s){
  curSz=s;
  document.getElementById('b20').className='sb2'+(s===20?' on':'');
  document.getElementById('b40').className='sb2'+(s===40?' on':'');
  hidden={}; render();
}

const fv=a=>{for(const v of a)if(v!==null)return v;return null};
const lv=a=>{for(let i=a.length-1;i>=0;i--)if(a[i]!==null)return a[i];return null};
const pct=(a,b)=>(!a||!b)?null:Math.round((b-a)/a*100);

function getTrendEntries(){
  const pfx=curR+'||'+curP+'||'+curPol+'||';
  return Object.entries(TREND).filter(([k])=>k.startsWith(pfx)).map(([k,v])=>[k.split('||')[3],v]);
}

/* ── KPI ── */
function buildKPI(){
  const entries=getTrendEntries();
  let mn=Infinity,mx=-Infinity,mnL='',mxL='',fs=[],ls=[];
  entries.forEach(([ln,ld])=>{
    const vals=curSz===20?ld.r20:ld.r40, f=fv(vals), l=lv(vals);
    if(f!==null&&l!==null){fs.push(f);ls.push(l);}
    vals.forEach(v=>{if(v!==null){if(v<mn){mn=v;mnL=ln;}if(v>mx){mx=v;mxL=ln;}}});
  });
  const af=fs.length?Math.round(fs.reduce((a,b)=>a+b)/fs.length):null;
  const al=ls.length?Math.round(ls.reduce((a,b)=>a+b)/ls.length):null;
  const ch=pct(af,al);
  const chHtml=ch===null?'':ch>0?`<div class="ks up">▲${ch}% (기간전체)</div>`:ch<0?`<div class="ks dn">▼${Math.abs(ch)}%</div>`:`<div class="ks fl">변동없음</div>`;
  document.getElementById('krow').innerHTML=`
    <div class="kc"><div class="kl">초기(${PERIODS[0]})</div><div class="kv">${af!=null?'$'+af.toLocaleString():'-'}</div></div>
    <div class="kc"><div class="kl">최신(${PERIODS[PERIODS.length-1]})</div><div class="kv">${al!=null?'$'+al.toLocaleString():'-'}</div>${chHtml}</div>
    <div class="kc"><div class="kl">최저가 선사</div><div class="kv" style="font-size:14px;margin-top:3px">${mnL||'-'}</div><div class="ks dn">${mn!==Infinity?'$'+mn.toLocaleString():''}</div></div>
    <div class="kc"><div class="kl">최고가 선사</div><div class="kv" style="font-size:14px;margin-top:3px">${mxL||'-'}</div><div class="ks up">${mx!==-Infinity?'$'+mx.toLocaleString():''}</div></div>`;
}

        callbacks:{label:c=>`${c.dataset.label}: $${c.parsed.y?.toLocaleString()??'-'}`}}},
      interaction:{mode:'index',intersect:false},
      scales:{
        x:{grid:{color:'rgba(0,0,0,.05)',drawTicks:false},ticks:{autoSkip:false,maxRotation:0,color:'#898781',font:{size:11}},border:{color:'#ddd'}},
        y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#898781',font:{size:10},callback:v=>'$'+v.toLocaleString()},border:{color:'#ddd'}}
      }
    }
  });
  const lr=document.getElementById('lgrow'); lr.innerHTML='';
  entries.forEach(([ln],i)=>{
    const c=COLORS[i%COLORS.length];
    const el=document.createElement('span');
    el.className='li'+(hidden[ln]?' off':'');
    el.innerHTML=`<span class="lsq" style="background:${c}"></span>${ln}`;
    el.onclick=()=>{hidden[ln]=!hidden[ln];chart.getDatasetMeta(i).hidden=!!hidden[ln];el.classList.toggle('off');chart.update();};
    lr.appendChild(el);
  });
}

/* ── Detail (선임 + 부대비 + 합계) ── */
function buildDetail(){
  const key=curR+'||'+curP+'||'+curPol;
  const rows=DETAIL[key]||[];
  document.getElementById('detBadge').textContent=LAST_P+' 기준';
  const wrap=document.getElementById('detWrap');

  if(!rows.length){
    wrap.innerHTML='<div style="padding:24px;color:var(--muted);text-align:center;grid-column:1/-1">해당 구간 데이터 없음</div>';
    return;
  }

  const sz20=curSz===20;

  // 선임 기준 오름차순 정렬
  const sorted=[...rows].sort((a,b)=>{
    const va=sz20?a.r20:a.r40, vb=sz20?b.r20:b.r40;
    if(va===null)return 1; if(vb===null)return -1; return va-vb;
  });

  wrap.innerHTML=sorted.map((row,idx)=>{
    const fare20=row.r20, fare40=row.r40;
    const mainFare=sz20?fare20:fare40;
    const {surs,warns,rawNote}=parseSurcharges(row.remark||'');

    const surTotal20=surs.reduce((s,x)=>s+(x.r20||0),0);
    const surTotal40=surs.reduce((s,x)=>s+(x.r40||0),0);
    const surTotalMain=sz20?surTotal20:surTotal40;
    const grandMain=mainFare!=null?mainFare+surTotalMain:null;

    const isBest=idx===0;
    const isSpot=warns.some(w=>w.includes('SPOT')||w.includes('주의'));
    const isStop=warns.some(w=>w.includes('부킹중단'));

    // 부대비 테이블 행
    const surRows=surs.map(s=>{
      const v20=s.r20!=null?'$'+s.r20.toLocaleString():'-';
      const v40=s.r40!=null?'$'+s.r40.toLocaleString():'-';
      const mainV=sz20?s.r20:s.r40;
      return `<tr>
        <td class="sur-name">${s.name}</td>
        <td class="sur-v${sz20?' active':''}">${v20}</td>
        <td class="sur-v${!sz20?' active':''}">${v40}</td>
      </tr>`;
    }).join('');

    // 기타 비고 (숫자 파싱 안된 부분)
    const hasOtherNote = rawNote && !/^\s*$/.test(rawNote);

    return `<div class="det-card">
      <!-- 헤더 -->
      <div class="det-head">
        <span class="line-badge">${row.line}</span>
        ${isBest?'<span class="best-badge">✓ 최저가</span>':''}
        ${row.tt?`<span class="tt-badge">⏱ ${row.tt}</span>`:''}
        ${isSpot?'<span class="spot-badge">⚠ SPOT주의</span>':''}
        ${isStop?'<span class="stop-badge">🚫 부킹중단</span>':''}
      </div>

      <div class="det-body">
        <!-- 선임 -->
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px">선임 (Ocean Freight)</div>
          <div class="fare-block">
            <div class="fare-col${sz20?' active':''}">
              <div class="fare-label">20ft</div>
              <div class="fare-val">${fare20!=null?'$'+fare20.toLocaleString():'N/A'}</div>
            </div>
            <div class="fare-col${!sz20?' active':''}">
              <div class="fare-label">40ft</div>
              <div class="fare-val">${fare40!=null?'$'+fare40.toLocaleString():'N/A'}</div>
            </div>
          </div>
        </div>

        <!-- 부대비 -->
        <div class="sur-block">
          <div class="sur-title">부대비용 (Surcharge)</div>
          ${surs.length?`
          <table class="sur-table">
            <tr style="background:#f7f6f3">
              <td class="sur-name" style="font-size:10px;color:var(--muted)">항목</td>
              <td class="sur-v" style="font-size:10px;color:var(--muted)">20ft</td>
              <td class="sur-v" style="font-size:10px;color:var(--muted)">40ft</td>
            </tr>
            ${surRows}
          </table>
          <div class="sur-total">
            <span class="sur-total-label">부대비 합계</span>
            <span class="sur-total-val">20ft ${surTotal20?'$'+surTotal20.toLocaleString():'—'} / 40ft ${surTotal40?'$'+surTotal40.toLocaleString():'—'}</span>
          </div>
          <div class="sur-grand">
            <span class="sur-grand-label">선임 + 부대비 합계 (${curSz}ft)</span>
            <span class="sur-grand-val">${grandMain!=null?'$'+grandMain.toLocaleString():'—'}</span>
          </div>`
          :`<div class="no-sur">별도 부대비 없음 (포함 운임)</div>`}
        </div>

        <!-- 원문 비고 -->
        ${hasOtherNote?`<div class="remark-row" style="font-size:11px;color:var(--sub);border-top:1px solid var(--bdr);padding-top:7px">
          <span style="font-weight:600;color:var(--muted)">비고 </span>${rawNote}
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function render(){
  buildKPI(); buildChart(); buildDetail();
}

// 초기화
(function(){
  for(const [region,pods] of Object.entries(MENU)){
    for(const pod of Object.keys(pods)){
      if(DETAIL[region+'||'+pod+'||부산']){ curR=region; curP=pod; break; }
    }
    if(curP) break;
  }
  buildSidebar(); render();
})();
</script>
</body>
</html>
